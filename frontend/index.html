<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workflow Automation & Research Platform</title>
    
    <!-- Register Service Worker to transpile JSX on the fly -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => {
                    console.log('Service Worker registered:', reg.scope);
                    if (!navigator.serviceWorker.controller) {
                        window.location.reload();
                    }
                })
                .catch(err => {
                    console.error('Service Worker registration failed:', err);
                });
        }
    </script>
    
    <!-- Tailwind CSS v4 Browser Compiler -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Custom Style Injection for Animations and Glassmorphism -->
    <style type="text/tailwindcss">
        @layer utilities {
            .glass {
                background: rgba(17, 24, 39, 0.7);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.08);
            }
            .glass-hover {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .glass-hover:hover {
                background: rgba(31, 41, 55, 0.8);
                border-color: rgba(255, 255, 255, 0.15);
                box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
                transform: translateY(-2px);
            }
            .gradient-bg {
                background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #09090b 100%);
            }
            .glow-indigo {
                box-shadow: 0 0 20px 2px rgba(99, 102, 241, 0.15);
            }
        }
        
        /* Custom animations */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        
        /* Shimmer effect for loaders */
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
        .shimmer::after {
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background-image: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.05) 20%,
                rgba(255, 255, 255, 0.1) 60%,
                rgba(255, 255, 255, 0) 100%
            );
            animation: shimmer 2s infinite;
            content: '';
        }

        /* Custom scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }
    </style>
    
    <!-- ES Modules Import Map -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom": "https://esm.sh/react-dom@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
                "lucide-react": "https://esm.sh/lucide-react@0.344.0"
            }
        }
    </script>
</head>
<body class="gradient-bg text-zinc-100 min-h-screen overflow-x-hidden font-sans">
    
    <!-- Application Root Mount Point -->
    <div id="root"></div>

    <!-- Main JavaScript Entry Point -->
    <script type="module" src="./app.js"></script>
</body>
</html>
